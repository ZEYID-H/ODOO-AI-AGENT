# Full SaaS stack — api (FastAPI, wraps the unchanged src/ business logic)
# + web (Next.js, chat UI + conversation persistence). The Streamlit path
# (Dockerfile / docker-compose.yml) is untouched and can still run
# independently — this is an additive, alternative stack.
#
# Build:  docker compose -f docker-compose.saas.yml build
# Run:    docker compose -f docker-compose.saas.yml up
#   web:   http://localhost:3000
#   api:   http://localhost:8000  (docs at /docs)
#
# Env files required (both git-ignored — see the matching *.example files):
#   .env                 (repo root)   — OPENAI_API_KEY, DATA_BACKEND, ODOO_*,
#                                         API_AUTH_SECRET
#   apps/web/.env.docker                — AUTH_SECRET, APP_ACCESS_PASSWORD
#
# API_AUTH_SECRET (Phase 10 — see docs/API_AUTHENTICATION.md) is a secret
# *shared* between both containers: apps/web signs a short-lived token with
# it, apps/api verifies that signature before running /chat or /tools. Set
# it once in the repo-root .env; `web`'s `environment:` block below pulls
# that same value in via Compose's own variable substitution (reading the
# root .env is automatic — no env_file entry needed for that part), so
# there's exactly one place to set or rotate it, not two files to keep in
# sync by hand.
#
# Networking note: `web`'s browser-side code (lib/api.ts, called from
# client components) fetches the API directly from the user's browser, not
# from inside the web container — so it needs the API's *published host*
# port (NEXT_PUBLIC_API_BASE_URL, baked into the client bundle at build
# time), not Docker's internal service DNS. The two containers ARE also on
# a shared internal network and can reach each other via the `api` service
# name (used by web's own startup healthcheck wait in docker-entrypoint.sh,
# and available for any future server-side calls) — internal DNS just
# isn't reachable from the browser running on the host.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      # Bound to 127.0.0.1 explicitly (Phase 9 audit finding): the bare
      # "8000:8000" form binds to ALL host network interfaces by default,
      # meaning apps/api would be reachable from any other device on the
      # same LAN, not just this machine. Phase 10 added real
      # cryptographic auth for /chat and /tools (docs/API_AUTHENTICATION.md)
      # — this loopback restriction is now defense-in-depth on top of
      # that, not the only thing standing between apps/api and the
      # network, but it's kept regardless: this stack is documented as
      # local-only tooling where the browser runs on the same host as the
      # containers (see the networking note above), so restricting to
      # loopback matches the actual intended usage with no behavior change.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    # Light container hardening (Phase 9 follow-up): both processes run as
    # non-root (see the Dockerfiles) and bind only to unprivileged ports,
    # so dropping every Linux capability and blocking privilege escalation
    # costs nothing functionally — verified by rebuilding and re-running
    # the full login/dashboard/chat/persistence flow with these applied.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ./apps/web
      args:
        # Baked into the browser bundle at build time — must be an address
        # the *browser* can reach, i.e. the API's published host port.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      # See the api service's port comment above — same reasoning.
      - "127.0.0.1:3000:3000"
    environment:
      # Points at the persistent volume below, not a path inside the image.
      DATABASE_URL: file:/data/conversations.db
      # Required in Docker: Auth.js only auto-trusts the request host when
      # NODE_ENV isn't "production" (true for `next dev`, false for our
      # image's `next start`). Without this, login fails closed with an
      # UntrustedHost error — verified against @auth/core's own env-default
      # logic, not assumed.
      AUTH_TRUST_HOST: "true"
      # Internal Docker network address (service name `api`) — used by
      # docker-entrypoint.sh's startup readiness wait; browser-side fetches
      # never use this (see the note above).
      API_INTERNAL_URL: http://api:8000
      # Same value as api's API_AUTH_SECRET (env_file below), sourced from
      # the repo-root .env via Compose's automatic variable substitution —
      # see the top-of-file comment.
      API_AUTH_SECRET: ${API_AUTH_SECRET}
    env_file:
      - ./apps/web/.env.docker
    volumes:
      - conversations-data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  # Survives `docker compose down` (only `down -v` removes it) — this is
  # what makes conversation history persist across container restarts.
  conversations-data:
