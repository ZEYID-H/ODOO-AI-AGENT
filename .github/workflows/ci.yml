name: CI

on:
  push:
    branches: [main]
  pull_request:

# Mirrors exactly the commands documented in README.md's "Testing" section
# and already run manually before every commit in this project — this
# workflow only wires them up, it does not add any new validation.
jobs:
  frontend:
    name: apps/web (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run lint

      # Prisma's generated client (lib/generated/prisma) is gitignored and
      # not committed — same as apps/web/Dockerfile, a placeholder
      # DATABASE_URL is enough for `prisma generate` (it only reads the
      # schema, never connects) and for `next build`'s static analysis.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/build-placeholder.db"

      - run: npm run build
        env:
          DATABASE_URL: "file:./prisma/build-placeholder.db"

      # npm test's own "pretest" script runs `prisma migrate deploy`
      # against an isolated prisma/test.db (see vitest.config.ts) — no
      # extra setup needed here.
      - run: npm run test

  backend:
    name: apps/api + standalone Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements-api.txt alone is sufficient for both test suites
      # below (Phase 9 audit: apps/api and the tests/ standalone suite
      # never import streamlit/pandas/pyarrow/altair — only openai +
      # python-dotenv from requirements.txt, both already listed here).
      - run: pip install -r requirements-api.txt

      - run: python -m pytest apps/api/tests -v
      - run: python -m pytest tests/ -v
      - run: python -m py_compile app.py apps/api/main.py apps/api/schemas.py
